<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<div class="score">
ATS Score : {{ score }}/100
</div>

<h2>Detected Skills</h2>

{% for skill in skills %}
<span class="skill">{{ skill }}</span>
{% endfor %}

<h2>Extracted Resume</h2>

<pre>{{ text }}</pre>

</div>

</body>
</html>
